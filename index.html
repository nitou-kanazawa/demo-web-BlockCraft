<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlockCraft</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='10' y='6' fill='%23795548'/%3E%3Crect width='16' height='6' fill='%234caf50'/%3E%3C/svg%3E">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-family: system-ui, sans-serif;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }
    #overlay .panel {
      background: rgba(20, 20, 20, 0.85);
      padding: 2rem 3rem;
      border-radius: 12px;
    }
    #overlay h1 {
      margin: 0 0 0.5rem;
    }
    #overlay .keys {
      color: #aaa;
      font-size: 0.9rem;
    }
    #hud {
      position: fixed;
      left: 10px;
      top: 8px;
      color: rgba(255, 255, 255, 0.9);
      font: 12px/1.4 ui-monospace, monospace;
      text-shadow: 0 1px 2px #000;
      pointer-events: none;
      white-space: pre;
    }
    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
      mix-blend-mode: difference;
    }
    #crosshair::before {
      left: 7px;
      top: 0;
      width: 2px;
      height: 16px;
    }
    #crosshair::after {
      left: 0;
      top: 7px;
      width: 16px;
      height: 2px;
    }
    .slot {
      position: relative;
      width: 44px;
      height: 44px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.18)),
        var(--swatch, transparent);
    }
    .slot.empty {
      background: rgba(0, 0, 0, 0.25);
    }
    .slot .icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      pointer-events: none;
    }
    .slot .count {
      position: absolute;
      right: 3px;
      bottom: 1px;
      color: #fff;
      font: bold 13px system-ui, sans-serif;
      text-shadow: 0 1px 2px #000;
      pointer-events: none;
    }
    .slot .key {
      position: absolute;
      left: 4px;
      top: 2px;
      color: rgba(255, 255, 255, 0.85);
      font: 11px system-ui, sans-serif;
      text-shadow: 0 1px 2px #000;
      pointer-events: none;
    }
    #hotbar {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 8px;
      pointer-events: none;
    }
    #hotbar .slot.selected {
      border-color: #fff;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
    }
    #inventory {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      padding: 14px;
      background: rgba(20, 20, 20, 0.92);
      border-radius: 12px;
      z-index: 10;
    }
    #inventory .inv-title {
      color: #ddd;
      font: 13px system-ui, sans-serif;
      margin-bottom: 8px;
    }
    #inventory .inv-grid {
      display: grid;
      grid-template-columns: repeat(9, 44px);
      gap: 4px;
    }
    #inventory .slot.panel-hotbar {
      margin-top: 8px;
      border-color: rgba(255, 220, 120, 0.5);
    }
    #cursor-stack {
      position: fixed;
      display: none;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
      border-color: #fff;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
